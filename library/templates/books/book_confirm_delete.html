{% extends "books/base.html" %}

{% block title %}Delete {{ book.title }}{% endblock %}

{% block content %}

<div class="book-card delete-card">
    <div class="book-inner">

        <h1 class="book-detail-title">Delete Book</h1>

        <p class="delete-warning">
            Are you sure you want to permanently delete
            <strong>"{{ book.title }}"</strong>?
            This action cannot be undone.
        </p>

        <hr class="bm-rule">

        <form method="post">
            {% csrf_token %}
            <div class="delete-actions">
                <button type="submit" class="bm-btn danger">🗑 Delete Book</button>
                <a href="{% url 'book_detail' book.pk %}" class="bm-btn secondary">Cancel</a>
            </div>
        </form>

    </div>
</div>

{% endblock %}
