{% extends "books/base.html" %}

{% block title %}
{% if form.istance.pk %}
Edit Quote
{% else %}
Add Quote
{% endif %}
{% endblock%}

{% block content %}
    <div class="book-card">
        <h1>
            {% if form.instance.pk %}
                Edit Quote
            {% else %}
                Add Quote
            {% endif %}
        </h1>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="bm-btn">
                {% if form.instance.pk %}
                    Update Quote
                {% else %}
                    Save Quote
                {% endif %}
            </button>

            <a href="javascript:history.back()" class="bm-btn">
                Cancel
            </a>
        </form>

    </div>
{% endblock %}
