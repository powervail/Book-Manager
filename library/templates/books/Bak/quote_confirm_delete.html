<h2>Delete Quote</h2>

<p>Are you sure you want to delete this quote?</p>

<blockquote>
    "{{ quote.text }}"
</blockquote>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="bm-btm danger">
        Delete
    </button>

    <a href="{% url 'book_detail' quote.book.pk%}" class="bm-btn">
        Cancel
    </a>
</form>
